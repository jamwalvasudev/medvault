spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/medhistory}
    username: ${DB_USERNAME:medhistory}
    password: ${DB_PASSWORD:medhistory}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile
        provider:
          google:
            issuer-uri: https://accounts.google.com
  jpa:
    show-sql: true

logging:
  level:
    com.medhistory: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET}
  vapid:
    public-key: ${VAPID_PUBLIC_KEY}
    private-key: ${VAPID_PRIVATE_KEY}
  storage:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    access-key: ${R2_ACCESS_KEY:minioadmin}
    secret-key: ${R2_SECRET_KEY:minioadmin}
    bucket: ${R2_BUCKET:medhistory}
    path-style-access: true   # required for MinIO
  cors:
    allowed-origins: http://localhost:5173
