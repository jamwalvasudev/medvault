services:
  postgres:
    image: postgres:16-alpine
    container_name: medhistory-postgres
    environment:
      POSTGRES_DB: medhistory
      POSTGRES_USER: medhistory
      POSTGRES_PASSWORD: medhistory
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medhistory"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: medhistory-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: medhistory-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/medhistory &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
